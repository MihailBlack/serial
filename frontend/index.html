<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Нетворкинг на мероприятии</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero card">
        <h1>Нетворкинг на мероприятии</h1>
        <p>
          Заполни анкету и нажми <strong>Кубики</strong>, чтобы познакомиться со
          случайным участником.
        </p>
        <button id="randomBtn" class="btn btn-primary">Кубики</button>
      </header>

      <section class="grid">
        <section class="card">
          <h2>Добавить анкету</h2>
          <form id="profileForm" novalidate>
            <label>
              ФИО
              <input id="fullName" name="fullName" type="text" required />
            </label>
            <label>
              Телефон
              <input id="phone" name="phone" type="tel" required />
            </label>
            <label>
              Чем занимаетесь
              <textarea id="about" name="about" rows="4" required></textarea>
            </label>
            <button type="submit" class="btn">Сохранить анкету</button>
          </form>
          <p id="formMessage" class="message" aria-live="polite"></p>
        </section>

        <section class="card">
          <h2>Случайный участник</h2>
          <div id="randomCard" class="random-card muted">
            Нажми кнопку "Кубики", чтобы найти нового человека.
          </div>
        </section>
      </section>

      <section class="card">
        <div class="list-head">
          <h2>Все участники</h2>
          <span id="countBadge" class="badge">0</span>
        </div>
        <ul id="profilesList" class="profiles-list"></ul>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
